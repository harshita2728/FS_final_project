<nav class="navbar navbar-expand-lg navbar-light site-navbar">
  <div class="container">
    <a class="navbar-brand" routerLink="/">StyleNest</a>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#mainNav"
      aria-controls="mainNav"
      aria-expanded="false"
      aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" routerLink="/">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/collection">Collection</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/about">About</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/contact">Contact</a>
        </li>

        <!-- Logged-in user: show email + Logout -->
        <li class="nav-item dropdown position-relative" *ngIf="auth.isLoggedIn()">
          <a class="nav-link" role="button" (click)="toggleDropdown()" aria-haspopup="true" [attr.aria-expanded]="isOpen">
            {{ auth.getUser()?.email || 'Account' }}
          </a>
          <ul class="dropdown-menu dropdown-menu-end show" *ngIf="isOpen">
            <li><a class="dropdown-item" routerLink="/collection" (click)="isOpen=false">Collection</a></li>
            <li><a class="dropdown-item" routerLink="/cart" (click)="isOpen=false">Cart</a></li>
            <li><a class="dropdown-item" routerLink="/wishlist" (click)="isOpen=false">Wishlist</a></li>
            <li><a class="dropdown-item" routerLink="/user/orders" (click)="isOpen=false">My Orders</a></li>
            <li><hr class="dropdown-divider"></li>
            <li>
              <a class="dropdown-item text-danger" href="javascript:void(0)" (click)="logout()">Logout</a>
            </li>
          </ul>
        </li>

        <!-- Guest: show Login dropdown -->
        <li class="nav-item dropdown position-relative" *ngIf="!auth.isLoggedIn()">
          <a class="nav-link" role="button" (click)="toggleDropdown()" aria-haspopup="true" [attr.aria-expanded]="isOpen">
            Login
          </a>
          <ul class="dropdown-menu dropdown-menu-end show" *ngIf="isOpen">
            <li>
              <a class="dropdown-item" routerLink="/admin/login" (click)="isOpen=false">
                Admin Login
              </a>
            </li>
            <li>
              <a class="dropdown-item" routerLink="/user/login" (click)="isOpen=false">
                User Login
              </a>
            </li>
            <li>
              <a class="dropdown-item" routerLink="/user/user-register" (click)="isOpen=false">
                Register
              </a>
            </li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>
