<div class="page-shell">
  <div class="page-card">
    <h3 class="page-title">User Login</h3>

    <form (ngSubmit)="login()">
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input
          type="email"
          class="form-control"
          id="email"
          [(ngModel)]="email"
          name="email"
          required
        />
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input
          type="password"
          class="form-control"
          id="password"
          [(ngModel)]="password"
          name="password"
          required
        />
      </div>
      <button class="btn btn-dark" [disabled]="!email || !password">Login</button>
    </form>

    <div *ngIf="message" class="alert alert-warning text-center mt-3">
      {{ message }}
    </div>

    <p class="text-center mt-3">
      Not registered?
      <a routerLink="/user/user-register" class="fw-bold">
        Register first
      </a>
    </p>
  </div>
</div>
