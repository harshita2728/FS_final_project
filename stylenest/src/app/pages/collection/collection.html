<section class="section">
  <div class="container">
    <div class="collection-categories">
      <p class="section-kicker">Shop by category</p>
      <h2 class="fw-bold mb-2">Women, Men & Kids</h2>
      <p class="text-muted mb-4">
        Browse curated looks for every wardrobe.
      </p>
      <div class="row g-4">
        <div class="col-lg-4">
          <a class="category-tile" routerLink="/collection" [queryParams]="{ category: 'women' }">
            <img
              src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1"
              alt="Women fashion"
            />
            <span>Women</span>
          </a>
        </div>
        <div class="col-lg-4">
          <a class="category-tile" routerLink="/collection" [queryParams]="{ category: 'men' }">
            <img
              src="https://images.unsplash.com/photo-1492562080023-ab3db95bfbce"
              alt="Men fashion"
            />
            <span>Men</span>
          </a>
        </div>
        <div class="col-lg-4">
          <a class="category-tile" routerLink="/collection" [queryParams]="{ category: 'kids' }">
            <img
              src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f"
              alt="Kids fashion"
            />
            <span>Kids</span>
          </a>
        </div>
      </div>
    </div>

    <div class="section-header">
      <p class="section-kicker">Curated drop</p>
      <h2 class="fw-bold mb-2">Our Collection</h2>
      <p class="text-muted mb-0">
        Discover our hand-picked styles designed for comfort and elegance.
      </p>
    </div>

    <div class="collection-filters">
      <a class="filter-chip" routerLink="/collection" [queryParams]="{ category: 'all' }" [class.active]="(activeCategory || 'all') === 'all'">All</a>
      <a class="filter-chip" routerLink="/collection" [queryParams]="{ category: 'women' }" [class.active]="activeCategory === 'women'">Women</a>
      <a class="filter-chip" routerLink="/collection" [queryParams]="{ category: 'men' }" [class.active]="activeCategory === 'men'">Men</a>
      <a class="filter-chip" routerLink="/collection" [queryParams]="{ category: 'kids' }" [class.active]="activeCategory === 'kids'">Kids</a>
    </div>

    <div class="row g-3">
      <div class="col-md-3" *ngFor="let product of products">
        <div class="card h-100 shadow-sm">
          <img
            [src]="product.image"
            class="card-img-top"
            [alt]="product.name"
          />

          <div class="card-body text-center d-flex flex-column">
            <h5 class="card-title">{{ product.name }}</h5>
            <p class="fw-bold text-primary price">&#8377;{{ product.price }}</p>
            <div class="mt-auto d-flex gap-1 flex-column">
              <button
                class="btn btn-dark btn-sm"
                (click)="addToCart(product)"
                [disabled]="addingId === product._id">
                {{ addingId === product._id ? 'Adding...' : 'Add to cart' }}
              </button>
              <button
                class="btn btn-outline-secondary btn-sm"
                (click)="addToWishlist(product)"
                [disabled]="addingWishlistId === product._id">
                {{ addingWishlistId === product._id ? '...' : 'Add to wishlist' }}
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
